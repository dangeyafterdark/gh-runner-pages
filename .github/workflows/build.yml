on:
  workflow_dispatch:
  schedule:
    - cron: "0 10 * * 5"

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        
      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.14'

      - name: Install dependencies - Pip
        run: pip install -r "requirements.txt"

      - name: Build site
        run: |
          cd site
          python3 ../main.py

      - name: Detect changes
        id: detect
        run: echo "changes=$( git status -s )" >> "$GITHUB_OUTPUT"

      - name: Commit changes
        if: steps.detect.outputs.changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "generated (run ${{ github.run_id }})"
          git push

      - name: Trigger Pages Deploy
        if: steps.detect.outputs.changes
        run: gh workflow run pages.yml
        env:
          GH_TOKEN: ${{ github.token }}
          
